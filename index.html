<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Arquitector contra los Funcionarios de Urbanismo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-wrap">
    <canvas id="game" width="960" height="540"></canvas>
    <div id="touch-controls" aria-hidden="true">
      <button id="btn-jump" class="tbtn" type="button"><span class="ic">⤒</span><span class="lb">SALTAR</span></button>
      <button id="btn-shoot" class="tbtn" type="button"><span class="ic">🔫</span><span class="lb">DISPARAR</span></button>
    </div>
    <button id="btn-fs" type="button" title="Pantalla completa">⛶</button>
    <div id="rotate-hint">↻ Gira el móvil en horizontal para jugar mejor</div>
  </div>
  <script src="game.js"></script>
</body>
</html>
